services:
  app:
    container_name: grn-app-dev
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://app:secret@postgres:5432/releases
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USER: any
      SMTP_PASS: any
      EMAIL_FROM: noreply@releases-api.app
      NODE_ENV: development
      BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      mailhog:
        condition: service_started

  postgres:
    container_name: grn-postgres-dev
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: releases
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d releases"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: grn-redis-dev
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailhog:
    container_name: grn-mailhog-dev
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata_dev:
